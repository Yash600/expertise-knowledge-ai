services:
  - type: web
    name: eka-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore        # closest to India; switch to oregon/frankfurt if needed
    healthCheckPath: /health

    envVars:
      # ── Required: set in Render dashboard ─────────────────────────────────
      - key: GROQ_API_KEY
        sync: false          # gsk_xxxx

      - key: QDRANT_URL
        sync: false          # https://xxxx.us-east4-0.gcp.cloud.qdrant.io

      - key: QDRANT_API_KEY
        sync: false          # from Qdrant Cloud cluster page

      - key: DATABASE_URL
        sync: false          # postgres://postgres.xxxx:PASSWORD@aws-0-xxx.pooler.supabase.com:5432/postgres

      - key: CLERK_SECRET_KEY
        sync: false          # sk_live_xxxx

      - key: CLERK_JWKS_URL
        sync: false          # https://YOUR_DOMAIN.clerk.accounts.dev/.well-known/jwks.json

      - key: ALLOWED_ORIGINS
        sync: false          # https://your-app.vercel.app (comma-separated if multiple)

      # ── Fixed values ───────────────────────────────────────────────────────
      - key: QDRANT_COLLECTION_NAME
        value: enterprise_docs

      - key: ENVIRONMENT
        value: production

      - key: OPENBLAS_NUM_THREADS
        value: "1"

      - key: OMP_NUM_THREADS
        value: "1"

      - key: TOKENIZERS_PARALLELISM
        value: "false"
